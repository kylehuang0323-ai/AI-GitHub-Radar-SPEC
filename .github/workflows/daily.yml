name: Daily AI GitHub Radar

on:
  schedule:
    - cron: '0 6 * * *'   # Run daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TEAMS_WORKFLOW_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUMMARY_PAGE_URL: ${{ vars.SUMMARY_PAGE_URL }}
        run: python main.py

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/ site/
          git diff --cached --quiet || git commit -m "chore: daily radar run $(date +%Y%m%d)"
          git push

      - name: Deploy to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy-pages:
    needs: radar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
